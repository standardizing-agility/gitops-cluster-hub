# Allows cluster-argocd's application controller to install the ACM operator,
# OLM objects in open-cluster-management, and the MultiClusterHub CR.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-argocd-acm-hub
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: ["operator.open-cluster-management.io"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["operators.coreos.com"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-argocd-acm-hub
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-argocd-acm-hub
subjects:
  - kind: ServiceAccount
    name: cluster-argocd-argocd-application-controller
    namespace: openshift-gitops-cluster
